server {
    listen 80;
    server_name aoe4.fr www.aoe4.fr 51.91.110.165;

    # Frontend — fichiers statiques React
    root /home/ubuntu/aoe4.fr/dist/apps/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long pour les assets avec hash (JS/CSS buildés par Vite)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend API — reverse proxy vers NestJS
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;

        # SSE support (current-games stream)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — toutes les routes React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
